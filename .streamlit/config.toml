[server]
headless = true
runOnSave = false
enableXsrfProtection = true
enableCORS = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false

[logger]
level = "warning"

[theme]
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#0D0E12"
secondaryBackgroundColor = "#1A1D24"
textColor = "#F3EEE8"
